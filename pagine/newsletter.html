<div class="section" style="display: block;">
    <button onclick="tornaAllHub()" class="btn-back-hub">← Torna all'Officina</button>
    
    <div style="max-width: 600px; margin: 0 auto; text-align: center;">
        <span style="font-size: 4rem; display: block; margin-bottom: 10px;">📩</span>
        <h2 style="color: var(--secondary); margin-bottom: 15px;">Iscriviti alla Newsletter</h2>
        <p style="font-size: 1.1rem; color: #555; margin-bottom: 30px; line-height: 1.6;">
            Unisciti ai colleghi dell'Officina. Riceverai aggiornamenti su nuove guide, personale ATA e nuovi simulatori direttamente nella tua casella email.<br>
            <strong style="color: var(--primary);">Zero spam, solo strumenti utili.</strong>
        </p>

        <form id="newsletter-form" onsubmit="submitToGoogle(event)" style="background: white; padding: 35px 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #eee;">
            
            <input type="text" id="work-address" name="work-address" style="display:none;" tabindex="-1">
            
            <input type="email" id="email-input" placeholder="Il tuo indirizzo email..." required style="padding:15px; border-radius:8px; border:1px solid #ccc; width:100%; max-width: 400px; margin-bottom: 20px; font-size: 1.05rem; box-sizing: border-box;">
            
            <div style="text-align: left; max-width: 400px; margin: 0 auto 25px auto; font-size: 0.9rem; color: #555; background: #f9f9f9; padding: 15px; border-radius: 8px; border: 1px dashed #ccc;">
                <label style="display: flex; align-items: flex-start; gap: 12px; cursor: pointer;">
                    <input type="checkbox" required style="margin-top: 3px; transform: scale(1.3);">
                    <span style="line-height: 1.5;">
                        Acconsento al trattamento dei dati. L'indirizzo verrà utilizzato <strong>esclusivamente</strong> per le comunicazioni dell'Officina dell'Assistente Tecnico, nel pieno rispetto della privacy. Nessuna cessione a terzi.
                    </span>
                </label>
            </div>
            
            <button type="submit" class="btn" id="submit-btn" style="max-width:400px; font-size: 1.1rem; padding: 15px;">Iscriviti alla Newsletter</button>
        </form>
        
        <div id="newsletter-msg" style="margin-top: 20px; font-weight: bold; display: none; padding: 15px; border-radius: 8px;"></div>
    </div>
</div>
