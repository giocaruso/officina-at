<div id="quiz-auth" class="section">
    <button class="btn-back" onclick="location.reload()">← Home</button>
    <div class="unlock-box">
        <img src="https://m.media-amazon.com/images/I/link-tua-copertina.jpg" style="width:100px; margin-bottom:20px;">
        <h2>Sblocca i Contenuti del Manuale</h2>
        <p>Verifica possesso: inserisci la <strong>prima parola</strong> della spiegazione alla <strong>domanda n. 187</strong> del manoscritto:</p>
        <input type="text" id="secret-word" placeholder="Scrivi la parola qui...">
        <br>
        <button class="btn-action" onclick="unlockQuiz()">Verifica e Accedi</button>
    </div>
</div>

<div id="quiz-setup" class="section">
    <h2>Quanto vuoi allenarti oggi?</h2>
    <p>Scegli il numero di domande per questa sessione:</p>
    <div class="grid">
        <button class="btn-action" onclick="prepareQuiz(25)">Sprint (25)</button>
        <button class="btn-action" onclick="prepareQuiz(50)">Standard (50)</button>
        <button class="btn-action" onclick="prepareQuiz(0)">Tutte (200)</button>
    </div>
</div>

<div id="quiz-results" class="section" style="text-align:center;">
    <h2 id="res-title">Risultato Finale</h2>
    <div id="res-score" style="font-size:3rem; color:var(--primary); margin:20px 0;"></div>
    <p id="res-comment"></p>
    <button class="btn-action" onclick="location.reload()">Torna alla Home</button>
</div>
